
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVIC Epidemiology - Interactive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-body: #f1f5f9; --bg-card: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Mobile First Base */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { background: var(--bg-card); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.4rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .loading { display: none; color: #ea580c; font-weight: 600; font-size: 0.9rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .layout { display: flex; flex-direction: column; flex: 1; }
        
        .sidebar { width: 100%; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .control-group { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .control-group h3 { font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
        .field { margin-bottom: 12px; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; }
        select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; background-color: white; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background-color 0.2s; }
        .btn-fetch { background: var(--primary); color: white; margin-top: 5px; }
        .btn-fetch:hover { background: var(--primary-hover); }
        .btn-export { background: #10b981; color: white; }
        .btn-img { background: #64748b; color: white; }

        .content { width: 100%; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .kpi-card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .kpi-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--primary); word-break: break-word; }

        .chart-wrapper { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); flex: 1; min-height: 400px; position: relative; }
        .export-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .export-row .btn { width: 100%; padding: 10px 16px; }

        .toggle-container { display: flex; background: #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .toggle-btn { flex: 1; text-align: center; padding: 10px 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--text-muted); border: none; background: transparent; transition: all 0.2s; }
        .toggle-btn.active { background: var(--primary); color: white; }

        .denominator-box { font-size: 0.8rem; color: #64748b; margin-top: auto; padding: 10px; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1; }

        /* Desktop Layout Overrides */
        @media (min-width: 768px) {
            body { overflow-y: hidden; } /* Disable global scroll to let panels scroll independently */
            .layout { flex-direction: row; overflow: hidden; }
            .sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); border-bottom: none; overflow-y: auto; }
            .content { flex: 1; overflow-y: auto; }
            .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            .export-row .btn { width: auto; }
        }
    </style>
</head>
<body>

    <div class="layout">

                <div class="field">

                <div class="toggle-container" id="metricToggle">

                <div class="field"><label>👥 Age group</label><select id="edatSelect" onchange="renderDashboard()"><option value="TOTS">All ages</option></select></div>
                <div class="field"><label>⚥ Sex</label><select id="sexeSelect" onchange="renderDashboard()"><option value="TOTS">All sexes</option></select></div>
            </div>
            
            <div class="denominator-box">
                <strong>💡 Current denominator:</strong> <br>
                <span id="popActualValue">0</span> inhabitants (based on active filters).

        </aside>

        <main class="content">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-title" id="kpiLabelTotal">Cumulative Cases</div><div class="kpi-value" id="kpiTotal">0</div></div>
                <div class="kpi-card"><div class="kpi-title" id="kpiLabelMitjana">Average</div><div class="kpi-value" id="kpiMitjana">0.0</div></div>
                <div class="kpi-card"><div class="kpi-title" id="kpiLabelPic">Maximum Peak</div><div class="kpi-value" id="kpiPic">0</div></div>
            </div>

            <div class="chart-wrapper"><canvas id="myChart"></canvas></div>

            <div class="export-row">
                <button class="btn btn-img" onclick="exportarImatge()">🖼️ Download PNG Chart</button>
                <button class="btn btn-export" onclick="exportarExcel()">📊 Download Excel Data</button>
            </div>
        </main>
    </div>

Sabadell - 2","Sabadell - 3","Sabadell - 4 B","Sabadell - 5","Sabadell - 6","Sabadell - 7","Salou","Salt","Sant Adrià de Besòs - 1","Sant Adrià de Besòs - 2","Sant Andreu de la Barca","Sant Boi de Llobregat - 1","Sant Boi de Llobregat - 2","Sant Boi de Llobregat - 3","Sant Boi de Llobregat - 4","Sant Boi de Llobregat - 5","Sant Celoni","Sant Cugat del Vallès - 1","Sant Cugat del Vallès - 2","Sant Cugat del Vallès - 3","Sant Feliu de Guíxols","Sant Feliu de Llobregat","Sant Hipòlit de Voltregà","Sant Joan de Vilatorrada","Sant Joan Despí - 1","Sant Joan Despí - 2","Sant Just Desvern","Sant Pere de Ribes","Sant Pere de Ribes rural","Sant Quirze de Besora","Sant Quirze del Vallès","Sant Sadurní d'Anoia","Sant Vicenç de Castellet","Sant Vicenç dels Horts - 1","Sant Vicenç dels Horts - 2","Santa Coloma de Cervelló","Santa Coloma de Farners","Santa Coloma de Gramenet - 1","Santa Coloma de Gramenet - 2","Santa Coloma de Gramenet - 3","Santa Coloma de Gramenet - 4","Santa Coloma de Gramenet - 5","Santa Coloma de Gramenet - 6","Santa Eulàlia de Ronçana","Santa Margarida de Montbui","Santa Maria de Palautordera","Santa Perpètua de Mogoda","Sarrià de Ter","Seròs","Sils - Vidreres - Maçanet de la Selva","Sitges","Solsona","Súria","Tarragona - 1","Tarragona - 2","Tarragona - 3","Tarragona - 4","Tarragona - 5","Tarragona - 6","Tarragona - 7","Tarragona - 8","Tàrrega","Terrassa - A","Terrassa - B","Terrassa - C","Terrassa - D","Terrassa - E","Terrassa - F","Terrassa - G","Terrassa - H","Tona","Torelló","Torredembarra","Torroella de Montgrí","Tortosa - 1 Est","Tortosa - 2 Oest","Tossa de Mar","Tremp","Ulldecona","Vall del Tenes","Valls","Vandellòs - l'Hospitalet de l'Infant","Vic - 1 Sud","Vic - 2 Nord","Viladecans - 1","Viladecans - 2","Vilafant","Vilafranca del Penedès - 1","Vilafranca del Penedès - 2","Vilanova del Camí","Vilanova i la Geltrú - 1","Vilanova i la Geltrú - 2","Vilanova i la Geltrú - 3","Vila-seca","Vilassar de Dalt","Vilassar de Mar","Xarxa sanitària i social Santa Tecla","l'Hospitalet de Llobregat - 01","l'Hospitalet de Llobregat - 02","l'Hospitalet de Llobregat - 03","l'Hospitalet de Llobregat - 04","l'Hospitalet de Llobregat - 05","l'Hospitalet de Llobregat - 06","l'Hospitalet de Llobregat - 07","l'Hospitalet de Llobregat - 08","l'Hospitalet de Llobregat - 09","l'Hospitalet de Llobregat - 10","l'Hospitalet de Llobregat - 11"];
        
        const absSelect = document.getElementById('absSelect');
        absList.forEach(a => { absSelect.innerHTML += `<option value="${a}">${a}</option>`; });

        let rawData = [];
        let filteredData = [];
        let myChart = null;
        let activeMetric = 'casos'; 
        let timeMode = 'setmanal';
        let populationMap = {}; 

        // Retain original Catalan diagnosis keys for API matching
        const colorsDiag = { "COVID-19": "#ef4444", "Grip": "#10b981", "VRS": "#f59e0b", "Rinovirus": "#3b82f6" };
        function getColor(diag, idx) { return colorsDiag[diag] || ["#14b8a6", "#f97316", "#06b6d4", "#6366f1"][idx % 4]; }

        // Toggle Management (Metrics and Time)
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const container = e.target.closest('.toggle-container');
                container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                if (container.id === 'metricToggle') {
                    activeMetric = e.target.getAttribute('data-val');
                } else if (container.id === 'timeToggle') {
                    timeMode = e.target.getAttribute('data-val');
                }
                renderDashboard(); 
            });
        });

        // Function to calculate ISO Epidemiological Week
        function getEpiWeek(dateString) {
            const date = new Date(dateString);
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            const weekNumber = 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            return `${date.getFullYear()}-W${weekNumber.toString().padStart(2, '0')}`; // Ex: 2025-W03
        }

        async function fetchAPIData() {
            const absName = document.getElementById('absSelect').value;
            const any = document.getElementById('anySelect').value;
            document.getElementById('loadingMsg').style.display = 'block';

            const whereClause = `nom_abs='${absName}' AND data >= '${any}-01-01T00:00:00' AND data <= '${any}-12-31T23:59:59'`;
            const url = `https://analisi.transparenciacatalunya.cat/resource/fa7i-d8gc.json?$where=${encodeURIComponent(whereClause)}&$limit=50000`;

            try {
                rawData = await fetch(url).then(r => r.json());
                if (rawData.length === 0) { alert(`No data in ${absName} for ${any}.`); return; }
                
                populationMap = {};
                const keys = Object.keys(rawData[0]);
                const fieldTaxa = keys.find(k => k.toLowerCase().includes('taxa') || k.toLowerCase().includes('incid')) || 'taxa';
                const fieldPob = keys.find(k => k.toLowerCase().includes('pob')) || 'poblacio';

                rawData.forEach(r => {
                    if(r.grup_edat && r.sexe) {
                        const key = r.grup_edat + '|' + r.sexe;
                        let c = parseInt(r.casos) || 0;
                        let t = parseFloat(r[fieldTaxa]) || 0;
                        let p = parseInt(r[fieldPob]) || 0;
                        
                        if (p === 0 && t > 0) p = (c / t) * 100000;
                        if (p > 0) {
                            if (!populationMap[key] || populationMap[key] < p) {
                                populationMap[key] = p; 
                            }
                        }
                    }
                });

                updateDynamicSelectors();
                renderDashboard();
            } catch (err) { alert("API Error: " + err.message); } 
            finally { document.getElementById('loadingMsg').style.display = 'none'; }
        }

        function updateDynamicSelectors() {
            const diags = new Set(), edats = new Set(), sexes = new Set();
            rawData.forEach(r => {
                if(r.diagnostic) diags.add(r.diagnostic);
                if(r.grup_edat) edats.add(r.grup_edat);
                if(r.sexe) sexes.add(r.sexe);
            });
            const populate = (id, set) => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="TOTS">All</option>`;
                Array.from(set).sort().forEach(val => sel.innerHTML += `<option value="${val}">${val}</option>`);
            };
            populate('diagSelect', diags); populate('edatSelect', edats); populate('sexeSelect', sexes);
        }

        function renderDashboard() {
            if (rawData.length === 0) return;

            const fDiag = document.getElementById('diagSelect').value;
            const fEdat = document.getElementById('edatSelect').value;
            const fSexe = document.getElementById('sexeSelect').value;

            let currentPopulation = 0;
            for (const key in populationMap) {
                const parts = key.split('|');
                if ((fEdat === 'TOTS' || parts[0] === fEdat) && (fSexe === 'TOTS' || parts[1] === fSexe)) {
                    currentPopulation += populationMap[key];
