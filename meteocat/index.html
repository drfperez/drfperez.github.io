<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Meteocat Dashboard (XEMA) · mobile first</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif; background: #eef2f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 20px 16px; }
        #setupScreen { text-align: center; padding: 20px 0 10px; }
        .setup-card { max-width: 460px; margin: 0 auto; background: #f9fcff; padding: 32px 20px; border-radius: 32px; border: 1px solid #dee7ef; }
        .setup-card h2 { font-size: 1.9rem; font-weight: 600; margin-bottom: 24px; color: #0b2b40; letter-spacing: -0.02em; }
        .setup-card label { display: block; text-align: left; font-weight: 600; color: #1e3b5c; margin-top: 20px; margin-bottom: 6px; font-size: 1rem; }
        .setup-card select { width: 100%; padding: 14px 16px; border-radius: 18px; border: 1.5px solid #cbd5e1; background: white; font-size: 1.05rem; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23334155" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat: no-repeat; background-position: right 16px center; background-size: 18px; }
        .btn-fetch { background: #0a7cbf; color: white; padding: 16px 20px; border-radius: 40px; border: none; font-weight: 700; font-size: 1.25rem; width: 100%; margin-top: 32px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 18px rgba(10,124,191,0.2); }
        .btn-fetch:hover { background: #086aa5; }
        .btn-fetch:disabled { background: #9bb7d4; box-shadow: none; cursor: not-allowed; }
        .header-flex { display: flex; flex-direction: column; gap: 18px; margin-bottom: 24px; }
        @media (min-width: 600px) { .header-flex { flex-direction: row; justify-content: space-between; align-items: flex-start; } }
        .titles h1 { font-size: 2rem; line-height: 1.2; color: #0b2b40; font-weight: 700; }
        .titles .subtitle { color: #2c4e6e; border-left: 5px solid #0a7cbf; padding-left: 16px; font-size: 1.1rem; margin-top: 8px; }
        .export-btns { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 12px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; flex: 1 0 auto; background: #e9ecf0; color: #1e293b; }
        .btn-png { background: #e0e7ef; }
        .btn-png:hover { background: #cbd5e1; }
        .btn-excel { background: #0e7b5e; color: white; }
        .btn-excel:hover { background: #0b644c; }
        .filters { background: #f2f7fd; padding: 24px 20px; border-radius: 32px; margin-bottom: 28px; }
        .filter-group label { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.3px; color: #1f4a6e; display: block; margin-bottom: 10px; }
        .filter-group select { width: 100%; padding: 15px 18px; border-radius: 30px; border: 1px solid #b9cbdf; background: white; font-size: 1.1rem; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23334155" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat: no-repeat; background-position: right 18px center; }
        .chart-container { position: relative; height: 380px; background: white; border-radius: 32px; padding: 12px 8px 8px 8px; border: 1px solid #dde5ed; margin-bottom: 24px; }
        @media (min-width: 600px) { .chart-container { height: 480px; } }
        .summary { display: flex; flex-wrap: wrap; gap: 16px; background: linear-gradient(125deg, #0c314a, #163a57); color: white; padding: 28px 22px; border-radius: 36px; margin-top: 12px; }
        .stat { flex: 1 1 140px; min-width: 130px; }
        .stat .label { font-size: 0.85rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.4px; }
        .stat .value { font-size: 2.2rem; font-weight: 700; display: block; margin-top: 4px; line-height: 1.1; }
        .loading-container { text-align: center; padding: 50px 20px; display: none; }
        .loading { font-size: 1.5rem; font-weight: 600; color: #0a7cbf; }
        .error { color: #c5283d; font-weight: 600; margin-top: 20px; }
        footer { text-align: center; margin-top: 32px; color: #587b9c; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">

    <!-- setup panel (English UI) -->
    <div id="setupScreen">
        <div class="setup-card">
            <h2>🌤️ Meteocat data</h2>
            
            <label>1. Choose weather station</label>
            <select id="stationSelect">
                <!-- will be replaced immediately with static list -->
                <option value="">Loading stations...</option>
            </select>

            <label>2. Choose year</label>
            <select id="initialYearSelect">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
                <option value="2019">2019</option>
                <option value="2018">2018</option>
                <option value="2017">2017</option>
                <option value="2016">2016</option>
                <option value="2015">2015</option>
                <option value="2014">2014</option>
                <option value="2013">2013</option>
                <option value="2012">2012</option>
            </select>
            
            <button class="btn-fetch" id="btnStartFetch" disabled>📡 Get data</button>
            <div id="setupError" class="error"></div>
        </div>
    </div>

    <!-- loading -->
    <div id="loadingArea" class="loading-container">
        <div class="loading" id="loadingText">⏳ Downloading records ...</div>
    </div>

    <!-- dashboard -->
    <div id="dashboardArea" style="display: none;">
        <div class="header-flex">
            <div class="titles">
                <h1 id="mainTitle">Meteocat · XEMA</h1>
                <div class="subtitle" id="subTitleText">daily aggregation</div>
            </div>
            <div class="export-btns">
                <button class="btn btn-png" id="btnDownloadPNG">🖼️ PNG chart</button>
                <button class="btn btn-excel" id="btnDownloadExcel">📊 Excel data (50k)</button>
                <button class="btn btn-png" onclick="location.reload()">🔁 Back</button>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>🌡️ Select variable to display</label>
                <select id="varFilter"></select>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="weatherChart"></canvas>
        </div>
        
        <div class="summary">
            <div class="stat"><span class="label">Total records</span><span class="value" id="totalRecords">0</span></div>
            <div class="stat"><span class="label">Maximum value</span><span class="value" id="maxValue">-</span></div>
            <div class="stat"><span class="label">Average value</span><span class="value" id="avgValue">-</span></div>
        </div>
    </div>
    
    <footer>Open data: Government of Catalonia (Dataset nzvn-apee)</footer>
</div>

  { code: "UA", name: "l'Ametlla de Mar" },
  { code: "CW", name: "l'Espluga de Francolí" },
  { code: "DF", name: "la Bisbal d'Empordà" },
  { code: "WO", name: "la Bisbal del Penedès" },
  { code: "UM", name: "la Granadella" },

];


        // Populate station select immediately with real names (fix broken template literals)
        function populateStations() {
            stationSelect.innerHTML = ''; // clear "Loading..."
            // Sort alphabetically by name
            const sorted = [...STATIC_STATIONS].sort((a, b) => a.name.localeCompare(b.name));
            sorted.forEach(s => {
                // Correct template literal: value="${s.code}" and text content
                stationSelect.innerHTML += `<option value="${s.code}">${s.name} (${s.code})</option>`;
            });
            // Set default to Barcelona Fabra (D5)
            stationSelect.value = "D5";
            btnStartFetch.disabled = false;
        }

        // Set default year to current year if available
        function setDefaultYear() {
            const currentYear = new Date().getFullYear().toString();
            if ([...initialYearSelect.options].some(opt => opt.value === currentYear)) {
                initialYearSelect.value = currentYear;
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            populateStations();
            setDefaultYear();
        });

        // Main fetch function – fixed URL parameters and template strings
        async function fetchYearData(station, year) {
            setupScreen.style.display = 'none';
            loadingArea.style.display = 'block';
            setupError.textContent = ''; // clear previous error

            // Get selected station's display name
            const selectedOption = stationSelect.options[stationSelect.selectedIndex];
            currentStationName = selectedOption ? selectedOption.text : station;

            try {
                let allJson = [];
                let offset = 0;
                let hasMore = true;

                // Correctly build where clause – no backslash escaping issues
                const whereClause = `codi_estacio='${station}' AND data_lectura >= '${year}-01-01T00:00:00' AND data_lectura <= '${year}-12-31T23:59:59'`;
                const encodedWhere = encodeURIComponent(whereClause);

                while (hasMore) {
                    loadingText.textContent = `⏳ Downloading data ... (${allJson.length.toLocaleString()} records fetched)`;
                    
                    // Correct SoQL parameters: $limit, $offset, $where
                    const url = `${DATA_API_URL}?$limit=${CHUNK_SIZE}&$offset=${offset}&$where=${encodedWhere}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`API error: ${response.status}`);
                    
                    const chunk = await response.json();
                    if (chunk.length === 0) {
                        hasMore = false;
                    } else {
                        allJson = allJson.concat(chunk);
                        offset += CHUNK_SIZE;
                        if (chunk.length < CHUNK_SIZE) hasMore = false;
                    }
                }

                if (allJson.length === 0) throw new Error(`No data for this station in ${year}.`);

                // Map raw data with safe field names
                rawData = allJson.map(r => ({
                    data_lectura: r.data_lectura,
                    dia: r.data_lectura ? r.data_lectura.split('T')[0] : '',
                    variable_codi: r.codi_variable,
                    variable_nom: VARIABLES_NOM[r.codi_variable] || `Variable ${r.codi_variable}`,
                    valor: parseFloat(r.valor_lectura) || 0
                }));

                initDashboard(year);
            } catch (err) {
                setupError.textContent = err.message;
                setupScreen.style.display = 'block';
                loadingArea.style.display = 'none';
            }
        }

        function initDashboard(year) {
            loadingArea.style.display = 'none';
            dashboardArea.style.display = 'block';
            document.getElementById('mainTitle').textContent = `🌤️ ${currentStationName}`;
            document.getElementById('subTitleText').textContent = `Daily summary – ${year}`;

            // Unique variables for filter
            const uniqueVars = [...new Set(rawData.map(r => r.variable_codi))];
// Només conservar les variables que existeixen a VARIABLES_NOM
const varsDefinides = uniqueVars.filter(v => VARIABLES_NOM.hasOwnProperty(v));

varFilter.innerHTML = '';
if (varsDefinides.length === 0) {
    varFilter.innerHTML = '<option value="">Cap variable definida</option>';
} else {
    varsDefinides.forEach(v => {
        const name = VARIABLES_NOM[v]; // segur que existeix
        varFilter.innerHTML += `<option value="${v}">${name}</option>`;
    });
}
            varFilter.addEventListener('change', updateDashboard);
            updateDashboard();
        }

        function updateDashboard() {
            const selectedVar = varFilter.value;
            if (!selectedVar) return;
            
            const filtered = rawData.filter(r => r.variable_codi === selectedVar);
            if (filtered.length === 0) return;

            const aggInfo = AGGREGATION_TYPES[selectedVar] || { agg: 'avg', label: 'Daily average' };
            const aggType = aggInfo.agg;
            const datasetLabel = aggInfo.label;

            // Group by day
            const dailyMap = new Map(); // day -> array of values
            filtered.forEach(r => {
                const day = r.dia;
                if (!dailyMap.has(day)) dailyMap.set(day, []);
                dailyMap.get(day).push(r.valor);
            });

            // Sort days
            const dates = Array.from(dailyMap.keys()).sort();
            const chartPoints = dates.map(day => {
                const vals = dailyMap.get(day);
                if (aggType === 'sum') return vals.reduce((a, b) => a + b, 0);
                if (aggType === 'max') return Math.max(...vals);
                if (aggType === 'min') return Math.min(...vals);
                // default average
                return vals.reduce((a, b) => a + b, 0) / vals.length;
            });

            const isSum = aggType === 'sum';
            const chartType = isSum ? 'bar' : 'line';
            const mainColor = isSum ? '#2563eb' : '#d97706';
            const bgColor = isSum ? 'rgba(37,99,235,0.15)' : 'rgba(217,119,6,0.1)';

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(document.getElementById('weatherChart'), {
                type: chartType,
                data: {
                    labels: dates,
                    datasets: [{
                        label: datasetLabel,
                        data: chartPoints,
                        borderColor: mainColor,
                        backgroundColor: bgColor,
                        fill: true,
                        tension: 0.2,
                        pointRadius: dates.length > 100 ? 1 : 3
                    }]
                },
                plugins: [whiteBackgroundPlugin],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        customCanvasBackgroundColor: { color: '#ffffff' },
                        legend: { labels: { boxWidth: 14, font: { size: 13 }, padding: 15 } }
                    },
                    scales: {
                        x: { ticks: { maxRotation: 45, minRotation: 30, font: { size: 10 } } }
                    }
                }
            });

            // Summary stats
            const allValues = filtered.map(r => r.valor);
            const maxVal = Math.max(...allValues);
            const avgVal = allValues.reduce((a, b) => a + b, 0) / allValues.length;

            document.getElementById('totalRecords').textContent = filtered.length.toLocaleString();
            document.getElementById('maxValue').textContent = Number.isFinite(maxVal) ? maxVal.toFixed(2) : '-';
            document.getElementById('avgValue').textContent = avgVal.toFixed(2);

            // Prepare export data (flat list)
            window.currentExport = filtered.map(r => ({
                'Station': currentStationName,
                'Full date': r.data_lectura,
                'Day': r.dia,
                'Variable': r.variable_nom,
                'Recorded value': r.valor
            }));
        }

        // Event listeners
        btnStartFetch.addEventListener('click', () => {
            const station = stationSelect.value;
            const year = initialYearSelect.value;
            if (station && year) fetchYearData(station, year);
        });

        document.getElementById('btnDownloadPNG').addEventListener('click', () => {
            if (!chartInstance) return;
            const a = document.createElement('a');
            a.href = chartInstance.toBase64Image();
            a.download = `Meteocat_${varFilter.value}_export.png`;
            a.click();
        });

        document.getElementById('btnDownloadExcel').addEventListener('click', () => {
            if (!window.currentExport || window.currentExport.length === 0) return;
            const wb = XLSX.utils.book_new();
            const dataToExport = window.currentExport;
            // Split into multiple sheets if exceeds CHUNK_SIZE (50k)
            if (dataToExport.length <= CHUNK_SIZE) {
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataToExport), "Data");
            } else {
                for (let i = 0; i < dataToExport.length; i += CHUNK_SIZE) {
                    const part = dataToExport.slice(i, i + CHUNK_SIZE);
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(part), `Data_Part_${Math.floor(i/CHUNK_SIZE)+1}`);
                }
            }
            XLSX.writeFile(wb, `Meteocat_export_${initialYearSelect.value}.xlsx`);
        });
    })();
</script>
