
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joc modular de ciències (JSON)</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <div id="app">
        <!-- PANTALLA INICIAL -->
        <section id="pantalla-inicial">
            <div class="hero-emoji" id="preview-emoji">🧪</div>
            <h1 id="preview-title">JOC DE CIÈNCIES</h1>
            <p class="subtitol" id="preview-subtitle">
                Selecciona un tema i juga amb preguntes de ciències.
            </p>

            <div class="config-box">
                <label for="selector-tema">Tema del joc</label>
                <select id="selector-tema"></select>

                <div class="preview-card">
                    <div class="preview-mini" id="preview-mini-emoji">🧪</div>
                    <div>
                        <div class="preview-mini-title" id="preview-mini-title">Tema</div>
                        <div class="preview-mini-text" id="preview-mini-text">
                            Descripció del tema.
                        </div>
                    </div>
                </div>
            </div>

            <p class="pregunta-jugadors">Quants jugadors participeu?</p>

            <div class="selector-jugadors">
                <button type="button" class="btn-jugadors" onclick="iniciarJoc(2)">
                    <span class="num">2</span> Jugadors
                </button>
                <button type="button" class="btn-jugadors" onclick="iniciarJoc(3)">
                    <span class="num">3</span> Jugadors
                </button>
                <button type="button" class="btn-jugadors" onclick="iniciarJoc(4)">
                    <span class="num">4</span> Jugadors
                </button>
            </div>

            <p class="nota">
                ✏️ L’alumnat només ha d’editar fitxers JSON per crear nous temes.
            </p>
        </section>

        <!-- PANTALLA JOC -->
        <section id="pantalla-joc">
            <div id="taulell-container">
                <div id="taulell"></div>
            </div>

            <aside id="panell">
                <h2 id="game-title">JOC</h2>
                <p class="game-theme-line">
                    <span id="game-emoji">🧪</span>
                    <span id="game-subtitle">Tema</span>
                </p>

                <div id="info-torn">
                    <span class="torn-label">Torn de:</span>
                    <div class="torn-jugador">
                        <span class="torn-color" id="torn-color-ind"></span>
                        <span id="torn-nom">Jugador 1</span>
                    </div>
                </div>

                <div id="dau-container">
                    <div id="dau" title="Clica per tirar!"></div>
                    <button type="button" id="btn-tirar" onclick="tirarDau()">🎲 Tirar dau</button>
                </div>

                <div id="registre">
                    <div class="entry entry-muted">🏁 Comença l'aventura científica!</div>
                </div>

                <button type="button" class="btn-reiniciar" onclick="reiniciarJoc()">
                    🔄 Tornar a l'inici
                </button>
            </aside>
        </section>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay">
        <div id="modal">
            <div class="emoji-modal" id="modal-emoji">❓</div>
            <h3 id="modal-title">Pregunta</h3>
            <p class="pregunta-text" id="pregunta-text"></p>
            <div class="opcions" id="opcions-container"></div>
            <p class="resultat-text" id="resultat-text"></p>
        </div>
    </div>

    <script src="./js/path.js"></script>
    <script src="./js/renderer.js"></script>
    <script src="./js/engine.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
